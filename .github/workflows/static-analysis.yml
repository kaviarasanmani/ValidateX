name: Static Analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy
          pip install numpy sqlalchemy
          pip install -e ".[dev,database]"

      - name: Check formatting with Black (non-blocking)
        run: black --check --diff validatex/ --line-length 120 --skip-string-normalization
        continue-on-error: true

      - name: Lint with Flake8
        run: |
          flake8 validatex/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503,E501,E722,E741,E402,F401

      - name: Type checking with mypy
        run: |
          mypy validatex/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --disable-error-code=misc \
            --exclude 'validatex/(cli|integrations)'
        continue-on-error: true
