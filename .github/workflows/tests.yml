name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev,database]"
        pip install numpy sqlalchemy

    - name: Test with pytest (excluding PySpark tests)
      run: |
        pytest tests/ -v --cov=validatex --cov-report=xml \
          --ignore=tests/unit/test_pyspark_expectations.py \
          -k "not pyspark and not spark"

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      if: matrix.python-version == '3.11'
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
